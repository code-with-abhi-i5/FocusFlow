<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0">
  <title>FocusFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container" id="popup">
    <!-- Header -->
    <header class="popup-header">
      <div class="header-left">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <h1 class="logo-text">FocusFlow</h1>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="themeToggle" title="Toggle theme">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="icon-btn" id="openDashboard" title="Open Dashboard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
        </button>
        <button class="icon-btn" id="openOptions" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Productivity Score Ring -->
    <section class="score-section">
      <div class="score-ring-container">
        <svg class="score-ring" viewBox="0 0 120 120">
          <defs>
            <linearGradient id="scoreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6366f1"/>
              <stop offset="100%" style="stop-color:#8b5cf6"/>
            </linearGradient>
          </defs>
          <circle class="score-ring-bg" cx="60" cy="60" r="52" fill="none" stroke-width="8"/>
          <circle class="score-ring-progress" id="scoreRing" cx="60" cy="60" r="52" fill="none" stroke-width="8" stroke-dasharray="326.73" stroke-dashoffset="326.73"/>
        </svg>
        <div class="score-value">
          <span class="score-number" id="scoreNumber">0</span>
          <span class="score-label">Score</span>
        </div>
      </div>
      <div class="score-meta">
        <div class="meta-item">
          <span class="meta-value" id="totalTime">0m</span>
          <span class="meta-label">Tracked</span>
        </div>
        <div class="meta-divider"></div>
        <div class="meta-item">
          <span class="meta-value" id="streakCount">0</span>
          <span class="meta-label">Day Streak</span>
        </div>
      </div>
    </section>

    <!-- Daily Goal Progress Bar -->
    <section class="goal-section" id="goalSection">
      <div class="goal-header">
        <span class="goal-label">Daily Goal</span>
        <span class="goal-text" id="goalText">0h / 4h</span>
      </div>
      <div class="goal-bar">
        <div class="goal-bar-fill" id="goalBarFill" style="width: 0%"></div>
        <div class="goal-milestone" style="left:25%"></div>
        <div class="goal-milestone" style="left:50%"></div>
        <div class="goal-milestone" style="left:75%"></div>
      </div>
    </section>

    <!-- Pomodoro Timer -->
    <section class="pomodoro-section" id="pomodoroSection">
      <div class="pomo-left">
        <svg class="pomo-ring" viewBox="0 0 80 80">
          <defs>
            <linearGradient id="pomoGradWork" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6366f1"/>
              <stop offset="100%" style="stop-color:#8b5cf6"/>
            </linearGradient>
            <linearGradient id="pomoGradBreak" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#10b981"/>
              <stop offset="100%" style="stop-color:#06b6d4"/>
            </linearGradient>
          </defs>
          <circle class="pomo-ring-bg" cx="40" cy="40" r="34" fill="none" stroke-width="5"/>
          <circle class="pomo-ring-progress" id="pomoRing" cx="40" cy="40" r="34" fill="none" stroke-width="5"
                  stroke-dasharray="213.63" stroke-dashoffset="0"/>
        </svg>
        <div class="pomo-time-overlay">
          <span class="pomo-time" id="pomoTime">25:00</span>
          <span class="pomo-mode" id="pomoMode">Work</span>
        </div>
      </div>
      <div class="pomo-right">
        <div class="pomo-sessions">
          <span class="pomo-sessions-count" id="pomoSessions">0</span>
          <span class="pomo-sessions-label">sessions today</span>
        </div>
        <div class="pomo-controls">
          <button class="pomo-btn pomo-start" id="pomoStart" title="Start">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
          <button class="pomo-btn pomo-pause" id="pomoPause" title="Pause" style="display:none">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
          <button class="pomo-btn pomo-reset" id="pomoReset" title="Reset">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.15"/></svg>
          </button>
        </div>
      </div>
    </section>

    <!-- Current Session -->
    <section class="current-session" id="currentSession" style="display:none;">
      <div class="session-badge">TRACKING</div>
      <div class="session-info">
        <img class="session-favicon" id="sessionFavicon" src="" alt="" width="16" height="16">
        <span class="session-domain" id="sessionDomain"></span>
        <span class="session-time" id="sessionTime"></span>
      </div>
    </section>

    <!-- Top Sites -->
    <section class="sites-section">
      <h2 class="section-title">Today's Activity</h2>
      <div class="sites-list" id="sitesList">
        <div class="empty-state" id="emptyState">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <p>Start browsing to track your time</p>
        </div>
      </div>
    </section>

    <!-- Focus Mode Toggle -->
    <section class="focus-section">
      <button class="focus-btn" id="focusToggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span id="focusLabel">Start Focus Mode</span>
      </button>
      <div class="focus-timer" id="focusTimer" style="display:none;">
        <span id="focusTimeRemaining"></span> remaining
      </div>
    </section>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
