<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusFlow — Stay Focused</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="blocked-container">
    <!-- Animated Background -->
    <div class="bg-gradient"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <!-- Content -->
    <div class="blocked-content">
      <div class="shield-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>

      <h1 class="blocked-title">Stay Focused</h1>
      <p class="blocked-subtitle">This site is blocked during your focus session</p>

      <div class="timer-section">
        <div class="timer-label">Session ends in</div>
        <div class="timer-display" id="timerDisplay">--:--</div>
      </div>

      <div class="stats-row" id="statsRow" style="display: none;">
        <div class="stat-card">
          <div class="stat-value" id="statProductive">0h 0m</div>
          <div class="stat-label">Productive Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statScore">0%</div>
          <div class="stat-label">Focus Score</div>
        </div>
      </div>

      <div class="quote-card" id="quoteCard">
        <p class="quote-text" id="quoteText">"The secret of getting ahead is getting started."</p>
        <p class="quote-author" id="quoteAuthor">— Mark Twain</p>
      </div>

      <div class="blocked-actions">
        <button class="btn-secondary" id="goBackBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
          Go Back
        </button>
        <button class="btn-primary" id="bypassBtn">
          I need 5 mins (<span id="bypassCount">3</span> left)
        </button>
      </div>
    </div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
